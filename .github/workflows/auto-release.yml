name: Auto Release

on:
  push:
    branches:
      - "**"

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.14"
          cache-disabled: true

      - name: Build jar
        run: gradle build --stacktrace --warning-mode all

      - name: Find jar
        id: jar
        run: |
          JAR="$(find build/libs -maxdepth 1 -type f -name '*.jar' ! -name '*-sources.jar' | head -n 1)"
          if [ -z "$JAR" ]; then
            echo "No jar in build/libs"
            ls -la build/libs || true
            exit 1
          fi
          echo "path=$JAR" >> "$GITHUB_OUTPUT"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: falthera-vape-${{ github.sha }}
          path: ${{ steps.jar.outputs.path }}

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "build-${GITHUB_SHA}" "${{ steps.jar.outputs.path }}" \
            --title "Falthera VAPE ${GITHUB_SHA}" \
            --notes "Automated release for commit ${GITHUB_SHA}" \
            --prerelease \
            --target "${GITHUB_SHA}"
