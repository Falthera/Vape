name: Auto Release

on:
  push:
    branches:
      - "**"

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Make Gradle launcher executable
        run: chmod +x ./gradlew

      - name: Build jar
        run: ./gradlew build --stacktrace --info --warning-mode all

      - name: Find jar
        id: jar
        run: |
          JAR="$(find build/libs -maxdepth 1 -type f -name '*.jar' | head -n 1)"
          if [ -z "$JAR" ]; then
            echo "No jar produced in build/libs"
            ls -la build/libs || true
            exit 1
          fi
          echo "path=$JAR" >> "$GITHUB_OUTPUT"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: falthera-vape-${{ github.sha }}
          path: ${{ steps.jar.outputs.path }}

      - name: Compute next release version
        id: version
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          LAST_TAG="$(gh release list --limit 200 --json tagName --jq '.[].tagName' | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | sort -V | tail -n 1 || true)"

          if [ -z "$LAST_TAG" ]; then
            LAST_TAG="v0.0.0"
          fi

          VERSION="${LAST_TAG#v}"
          IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION"

          if [ -z "$MAJOR" ] || [ -z "$MINOR" ] || [ -z "$PATCH" ]; then
            echo "Failed to parse last version tag: $LAST_TAG"
            exit 1
          fi

          NEXT_PATCH=$((PATCH + 1))
          NEXT_TAG="v${MAJOR}.${MINOR}.${NEXT_PATCH}"

          echo "last_tag=$LAST_TAG" >> "$GITHUB_OUTPUT"
          echo "next_tag=$NEXT_TAG" >> "$GITHUB_OUTPUT"

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ steps.version.outputs.next_tag }}" "${{ steps.jar.outputs.path }}" \
            --title "Falthera VAPE ${{ steps.version.outputs.next_tag }}" \
            --notes "Automated release ${{ steps.version.outputs.next_tag }} for commit ${GITHUB_SHA}" \
            --target "${GITHUB_SHA}"
